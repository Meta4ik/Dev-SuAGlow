<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | SuA K Glow Korean Med Spa</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@300;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="dist/output.css?v=38">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-off-white text-charcoal antialiased home-page">

    <!-- Hero Section -->
    <section id="page-hero" data-nav-theme="dark"
        class="relative min-h-[80vh] flex flex-col items-center justify-center text-center px-8 overflow-hidden pt-[150px] pb-32">
        <div class="absolute inset-0 z-0">
            <img src="assets/bg_hero.webp" class="w-full h-full object-cover" alt="Hero Background">
            <div class="absolute inset-0 bg-near-black/50 backdrop-blur-[2px]"></div>
        </div>
        <div class="relative z-10 max-w-5xl animate-on-scroll fade-up delay-200">
            <span
                class="inline-block px-6 py-2 border border-warm-gold/50 text-warm-gold text-xs font-bold uppercase tracking-[0.5em] mb-8 rounded-full">Stay Tuned</span>
            <h1 class="heading-wide text-5xl md:text-8xl mb-8 leading-[1.05] text-white">Coming <span
                    class="text-warm-gold">Soon.</span></h1>
            <p
                class="text-sm md:text-xl text-off-white/80 max-w-2xl mx-auto mb-12 font-light tracking-wide leading-relaxed">
                We are curating something extraordinary. Check back soon for the latest updates to our premium K-Beauty services.
            </p>
        </div>
        
        <!-- Abstract gradient shapes -->
        <div class="absolute top-[-10%] left-[-10%] w-[600px] h-[600px] bg-taupe/20 rounded-full blur-[120px] -z-10 mix-blend-screen"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[800px] h-[800px] bg-warm-gold/10 rounded-full blur-[150px] -z-10 mix-blend-screen"></div>
    </section>

    <!-- Brand Section -->
    <section data-nav-theme="light" class="bg-near-black text-white py-24 px-10 text-center relative z-10">
        <div class="max-w-4xl mx-auto">
            <img src="assets/logo-main.webp" alt="SuA K-Glow" class="h-16 mx-auto mb-8 brightness-0 invert opacity-70">
            <p class="heading-wide text-xs tracking-[0.7em] opacity-30 mb-8">K-Beauty Medspa • Carrollton HQ</p>
        </div>
    </section>

    <script src="script.js?v=38"></script>
</body>

</html>
