<!DOCTYPE html>
<html>
<head>
    <title>View Portraits</title>
    <style>
        body { font-family: sans-serif; background: #333; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .grid { display: grid; grid-template-cols: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1500px; }
        .card { background: #444; border-radius: 12px; overflow: hidden; padding: 10px; text-align: center; }
        img { width: 100%; height: 350px; object-fit: cover; border-radius: 8px; }
        h3 { margin: 10px 0 5px 0; }
    </style>
</head>
<body>
    <h1>Model Portraits Library</h1>
    <div class="grid">
        <div class="card">
            <img src="../assets/korean-models/portrait_1_highres.png">
            <h3>Portrait 1</h3>
        </div>
        <div class="card">
            <img src="../assets/korean-models/portrait_2_highres.png">
            <h3>Portrait 2</h3>
        </div>
        <div class="card">
            <img src="../assets/korean-models/portrait_3_highres.png">
            <h3>Portrait 3</h3>
        </div>
        <div class="card">
            <img src="../assets/korean-models/portrait_4_highres.png">
            <h3>Portrait 4</h3>
        </div>
        <div class="card">
            <img src="../assets/korean-models/portrait_5_highres.png">
            <h3>Portrait 5</h3>
        </div>
    </div>
</body>
</html>
